<style>
  :root {
    --color-text-primary: #e2e8f0;
    --color-text-secondary: #94a3b8;
    --color-text-info: #93c5fd;
    --color-text-success: #6ee7b7;
    --color-background-secondary: #0f172a;
    --color-background-info: #1e3a5f;
    --color-background-success: #064e3b;
    --color-border-secondary: #334155;
    --border-radius-md: 8px;
  }
  html, body { margin:0; padding:0; background:#020617; overflow:hidden; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; }
  .cell { display:inline-flex; align-items:center; justify-content:center; width:48px; height:44px; border:1.5px solid var(--color-border-secondary); border-radius:6px; font-size:14px; font-weight:500; color:var(--color-text-primary); transition:all 0.3s; margin:0 3px; }
  .cell.eliminated { border-color:#475569; background:rgba(71,85,105,0.2); color:#64748b; opacity:0.5; }
  .cell.active { border-color:#93c5fd; background:var(--color-background-info); color:var(--color-text-info); }
  .cell.mid1 { border-color:#FAC775; background:rgba(250,199,117,0.15); color:#FAC775; box-shadow:0 0 6px rgba(250,199,117,0.2); }
  .cell.mid2 { border-color:#AFA9EC; background:rgba(175,169,236,0.15); color:#AFA9EC; box-shadow:0 0 6px rgba(175,169,236,0.2); }
  .cell.found { border-color:#065f46; background:var(--color-background-success); color:var(--color-text-success); box-shadow:0 0 12px rgba(110,231,183,0.3); }
  .btn { padding:6px 16px; border-radius:var(--border-radius-md); border:0.5px solid var(--color-border-secondary); background:transparent; color:var(--color-text-primary); cursor:pointer; font-size:13px; transition:background 0.15s; }
  .btn:hover { background:var(--color-background-secondary); }
  .btn:disabled { opacity:0.4; cursor:not-allowed; }
  .btn.primary { background:var(--color-background-info); color:var(--color-text-info); border-color:transparent; }
  .legend-dot { width:10px; height:10px; border-radius:50%; display:inline-block; }
  .step-log { font-size:12px; color:var(--color-text-secondary); min-height:20px; transition:opacity 0.3s; }
</style>

<div style="padding:1.5rem 1rem 0">
  <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:4px">
    <div>
      <span style="font-size:16px; font-weight:500; color:var(--color-text-primary)">Ternary search</span>
      <span style="font-size:13px; color:var(--color-text-secondary); margin-left:8px">-divide into thirds, O(log₃ n)</span>
    </div>
    <span id="step-label" style="font-size:12px; color:var(--color-text-secondary)">Step 0</span>
  </div>

  <div style="display:flex; gap:14px; margin-bottom:18px; flex-wrap:wrap">
    <span style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--color-text-secondary)"><span class="legend-dot" style="background:var(--color-background-info);border:1px solid #93c5fd"></span>Active range</span>
    <span style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--color-text-secondary)"><span class="legend-dot" style="background:rgba(250,199,117,0.15);border:1px solid #FAC775"></span>mid1</span>
    <span style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--color-text-secondary)"><span class="legend-dot" style="background:rgba(175,169,236,0.15);border:1px solid #AFA9EC"></span>mid2</span>
    <span style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--color-text-secondary)"><span class="legend-dot" style="background:var(--color-background-success);border:1px solid #065f46"></span>Found</span>
  </div>

  <div style="background:var(--color-background-secondary); border-radius:var(--border-radius-md); padding:16px; margin-bottom:6px">
    <div style="font-size:11px; color:var(--color-text-secondary); margin-bottom:8px">Target: <span style="color:var(--color-text-info); font-weight:600; font-size:14px">67</span> &nbsp;|&nbsp; Divides search space into 3 equal parts</div>
    <div id="array-display" style="display:flex; flex-wrap:wrap; justify-content:center; gap:2px"></div>
    <div id="marker-row" style="display:flex; flex-wrap:wrap; justify-content:center; gap:2px; margin-top:4px"></div>
  </div>

  <div id="step-log" class="step-log" style="margin-bottom:14px; text-align:center"></div>

  <div style="display:flex; gap:16px; margin-bottom:16px; flex-wrap:wrap">
    <div style="flex:1; min-width:70px; background:var(--color-background-secondary); border-radius:var(--border-radius-md); padding:10px 14px">
      <div style="font-size:11px; color:var(--color-text-secondary); margin-bottom:3px">low</div>
      <div id="low-display" style="font-size:18px; font-weight:500; color:var(--color-text-primary)">0</div>
    </div>
    <div style="flex:1; min-width:70px; background:var(--color-background-secondary); border-radius:var(--border-radius-md); padding:10px 14px">
      <div style="font-size:11px; color:var(--color-text-secondary); margin-bottom:3px">mid1</div>
      <div id="mid1-display" style="font-size:18px; font-weight:500; color:#FAC775">—</div>
    </div>
    <div style="flex:1; min-width:70px; background:var(--color-background-secondary); border-radius:var(--border-radius-md); padding:10px 14px">
      <div style="font-size:11px; color:var(--color-text-secondary); margin-bottom:3px">mid2</div>
      <div id="mid2-display" style="font-size:18px; font-weight:500; color:#AFA9EC">—</div>
    </div>
    <div style="flex:1; min-width:70px; background:var(--color-background-secondary); border-radius:var(--border-radius-md); padding:10px 14px">
      <div style="font-size:11px; color:var(--color-text-secondary); margin-bottom:3px">high</div>
      <div id="high-display" style="font-size:18px; font-weight:500; color:var(--color-text-primary)">11</div>
    </div>
    <div style="flex:1; min-width:80px; background:var(--color-background-secondary); border-radius:var(--border-radius-md); padding:10px 14px">
      <div style="font-size:11px; color:var(--color-text-secondary); margin-bottom:3px">Comparisons</div>
      <div id="cmp-count" style="font-size:18px; font-weight:500; color:var(--color-text-primary)">0</div>
    </div>
  </div>

  <div style="display:flex; gap:8px; flex-wrap:wrap; align-items:center">
    <button class="btn primary" id="btn-step" onclick="stepOnce()">Step →</button>
    <button class="btn" id="btn-auto" onclick="toggleAuto()">Auto play</button>
    <button class="btn" id="btn-reset" onclick="init()">Reset</button>
    <div style="margin-left:auto; display:flex; align-items:center; gap:8px; font-size:12px; color:var(--color-text-secondary)">
      Speed <input type="range" id="speed" min="100" max="900" value="400" step="100" style="width:80px" oninput="updateSpeed()">
      <span id="speed-label">0.8×</span>
    </div>
  </div>
</div>

<script>
const ARR = [5, 12, 18, 27, 34, 44, 55, 67, 72, 83, 91, 98];
const TARGET = 67;
let allSteps, stepIdx, autoTimer, speedMs, cmpCount;

function buildSteps() {
  const steps = [{type:'initial', low:0, high:ARR.length-1}];
  let low = 0, high = ARR.length - 1;
  while (low <= high) {
    const mid1 = low + Math.floor((high - low) / 3);
    const mid2 = high - Math.floor((high - low) / 3);
    steps.push({type:'calc', low, high, mid1, mid2});
    // Check mid1
    steps.push({type:'check-mid1', low, high, mid1, mid2, val:ARR[mid1]});
    if (ARR[mid1] === TARGET) { steps.push({type:'found', idx:mid1}); return steps; }
    // Check mid2
    steps.push({type:'check-mid2', low, high, mid1, mid2, val:ARR[mid2]});
    if (ARR[mid2] === TARGET) { steps.push({type:'found', idx:mid2}); return steps; }
    // Narrow range
    if (TARGET < ARR[mid1]) { high = mid1 - 1; steps.push({type:'go-left', low, high, mid1, mid2}); }
    else if (TARGET > ARR[mid2]) { low = mid2 + 1; steps.push({type:'go-right', low, high, mid1, mid2}); }
    else { low = mid1 + 1; high = mid2 - 1; steps.push({type:'go-middle', low, high, mid1, mid2}); }
  }
  steps.push({type:'not-found'});
  return steps;
}

function renderArr(low, high, mid1, mid2, foundIdx) {
  const d = document.getElementById('array-display');
  const mr = document.getElementById('marker-row');
  d.innerHTML = ''; mr.innerHTML = '';
  ARR.forEach((val, idx) => {
    const cell = document.createElement('div');
    cell.className = 'cell';
    cell.textContent = val;
    if (idx === foundIdx) cell.classList.add('found');
    else if (idx === mid1) cell.classList.add('mid1');
    else if (idx === mid2) cell.classList.add('mid2');
    else if (idx >= low && idx <= high) cell.classList.add('active');
    else cell.classList.add('eliminated');
    d.appendChild(cell);
    const lbl = document.createElement('div');
    lbl.style.cssText = 'display:inline-flex;align-items:center;justify-content:center;width:48px;height:20px;font-size:10px;margin:0 3px';
    let m = [];
    if (idx === low) m.push('<span style="color:#93c5fd">L</span>');
    if (idx === mid1) m.push('<span style="color:#FAC775">m1</span>');
    if (idx === mid2) m.push('<span style="color:#AFA9EC">m2</span>');
    if (idx === high) m.push('<span style="color:#93c5fd">H</span>');
    lbl.innerHTML = m.join(' ');
    mr.appendChild(lbl);
  });
}

function init() {
  clearInterval(autoTimer); autoTimer = null;
  document.getElementById('btn-auto').textContent = 'Auto play';
  allSteps = buildSteps(); stepIdx = 0; cmpCount = 0; updateSpeed();
  renderArr(0, ARR.length-1, -1, -1, -1);
  document.getElementById('cmp-count').textContent = '0';
  document.getElementById('low-display').textContent = '0';
  document.getElementById('high-display').textContent = ARR.length-1;
  document.getElementById('mid1-display').textContent = '—';
  document.getElementById('mid2-display').textContent = '—';
  document.getElementById('step-label').textContent = 'Step 0';
  document.getElementById('step-log').textContent = 'Press Step or Auto play to begin';
  document.getElementById('btn-step').disabled = false;
}

function updateSpeed() { const v = parseInt(document.getElementById('speed').value); speedMs = 1200 - v; document.getElementById('speed-label').textContent = (v/500).toFixed(1) + '×'; }
function setLog(msg) { const el = document.getElementById('step-log'); el.style.opacity = '0'; setTimeout(() => { el.textContent = msg; el.style.opacity = '1'; }, 120); }

function applyStep(s) {
  if (!s) return;
  document.getElementById('step-label').textContent = 'Step ' + stepIdx;
  if (s.type === 'initial') { renderArr(0, ARR.length-1, -1, -1, -1); setLog('Ternary search -splits range into 3 parts using 2 mid points'); }
  else if (s.type === 'calc') {
    document.getElementById('low-display').textContent = s.low;
    document.getElementById('high-display').textContent = s.high;
    document.getElementById('mid1-display').textContent = s.mid1;
    document.getElementById('mid2-display').textContent = s.mid2;
    renderArr(s.low, s.high, s.mid1, s.mid2, -1);
    setLog('mid1=' + s.mid1 + ' (arr[' + s.mid1 + ']=' + ARR[s.mid1] + '), mid2=' + s.mid2 + ' (arr[' + s.mid2 + ']=' + ARR[s.mid2] + ')');
  }
  else if (s.type === 'check-mid1') { cmpCount++; document.getElementById('cmp-count').textContent = cmpCount; renderArr(s.low, s.high, s.mid1, s.mid2, -1); setLog('Check mid1: arr[' + s.mid1 + ']=' + s.val + (s.val === TARGET ? ' ✓' : ' ≠ ' + TARGET)); }
  else if (s.type === 'check-mid2') { cmpCount++; document.getElementById('cmp-count').textContent = cmpCount; renderArr(s.low, s.high, s.mid1, s.mid2, -1); setLog('Check mid2: arr[' + s.mid2 + ']=' + s.val + (s.val === TARGET ? ' ✓' : ' ≠ ' + TARGET)); }
  else if (s.type === 'go-left') { document.getElementById('high-display').textContent = s.high; renderArr(s.low, s.high, -1, -1, -1); setLog('Target < mid1 → search LEFT third'); }
  else if (s.type === 'go-right') { document.getElementById('low-display').textContent = s.low; renderArr(s.low, s.high, -1, -1, -1); setLog('Target > mid2 → search RIGHT third'); }
  else if (s.type === 'go-middle') { document.getElementById('low-display').textContent = s.low; document.getElementById('high-display').textContent = s.high; renderArr(s.low, s.high, -1, -1, -1); setLog('mid1 < Target < mid2 → search MIDDLE third'); }
  else if (s.type === 'found') {
    renderArr(-1, -1, -1, -1, s.idx);
    setLog('Found ' + TARGET + ' at index ' + s.idx + '! ' + cmpCount + ' comparisons');
    document.getElementById('step-label').textContent = 'Found ✓';
    document.getElementById('btn-step').disabled = true;
    clearInterval(autoTimer); autoTimer = null; document.getElementById('btn-auto').textContent = 'Auto play';
  }
}

function stepOnce() { if (stepIdx >= allSteps.length) return; applyStep(allSteps[stepIdx]); stepIdx++; }
function toggleAuto() { if (autoTimer) { clearInterval(autoTimer); autoTimer = null; document.getElementById('btn-auto').textContent = 'Auto play'; } else { document.getElementById('btn-auto').textContent = 'Pause'; autoTimer = setInterval(() => { if (stepIdx >= allSteps.length) { clearInterval(autoTimer); autoTimer = null; document.getElementById('btn-auto').textContent = 'Auto play'; return; } applyStep(allSteps[stepIdx]); stepIdx++; }, speedMs); } }

init();
</script>
