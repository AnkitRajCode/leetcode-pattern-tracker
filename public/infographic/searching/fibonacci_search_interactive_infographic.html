<style>
  :root {
    --color-text-primary: #e2e8f0;
    --color-text-secondary: #94a3b8;
    --color-text-info: #93c5fd;
    --color-text-success: #6ee7b7;
    --color-background-secondary: #0f172a;
    --color-background-info: #1e3a5f;
    --color-background-success: #064e3b;
    --color-border-secondary: #334155;
    --border-radius-md: 8px;
  }
  html, body { margin:0; padding:0; background:#020617; overflow:hidden; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; }
  .cell { display:inline-flex; align-items:center; justify-content:center; width:48px; height:44px; border:1.5px solid var(--color-border-secondary); border-radius:6px; font-size:14px; font-weight:500; color:var(--color-text-primary); transition:all 0.3s; margin:0 3px; }
  .cell.eliminated { border-color:#475569; background:rgba(71,85,105,0.2); color:#64748b; opacity:0.5; }
  .cell.active { border-color:#93c5fd; background:var(--color-background-info); color:var(--color-text-info); }
  .cell.fib-probe { border-color:#FAC775; background:rgba(250,199,117,0.15); color:#FAC775; box-shadow:0 0 8px rgba(250,199,117,0.2); }
  .cell.found { border-color:#065f46; background:var(--color-background-success); color:var(--color-text-success); box-shadow:0 0 12px rgba(110,231,183,0.3); }
  .fib-display { display:inline-flex; gap:4px; padding:4px 10px; border-radius:12px; font-size:12px; background:var(--color-background-secondary); border:1px solid var(--color-border-secondary); }
  .btn { padding:6px 16px; border-radius:var(--border-radius-md); border:0.5px solid var(--color-border-secondary); background:transparent; color:var(--color-text-primary); cursor:pointer; font-size:13px; transition:background 0.15s; }
  .btn:hover { background:var(--color-background-secondary); }
  .btn:disabled { opacity:0.4; cursor:not-allowed; }
  .btn.primary { background:var(--color-background-info); color:var(--color-text-info); border-color:transparent; }
  .legend-dot { width:10px; height:10px; border-radius:50%; display:inline-block; }
  .step-log { font-size:12px; color:var(--color-text-secondary); min-height:20px; transition:opacity 0.3s; }
</style>

<div style="padding:1.5rem 1rem 0">
  <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:4px">
    <div>
      <span style="font-size:16px; font-weight:500; color:var(--color-text-primary)">Fibonacci search</span>
      <span style="font-size:13px; color:var(--color-text-secondary); margin-left:8px">-uses Fibonacci numbers to split, O(log n)</span>
    </div>
    <span id="step-label" style="font-size:12px; color:var(--color-text-secondary)">Step 0</span>
  </div>

  <div style="display:flex; gap:14px; margin-bottom:18px; flex-wrap:wrap">
    <span style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--color-text-secondary)"><span class="legend-dot" style="background:var(--color-background-info);border:1px solid #93c5fd"></span>Active range</span>
    <span style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--color-text-secondary)"><span class="legend-dot" style="background:rgba(250,199,117,0.15);border:1px solid #FAC775"></span>Probe (Fib offset)</span>
    <span style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--color-text-secondary)"><span class="legend-dot" style="background:var(--color-background-success);border:1px solid #065f46"></span>Found</span>
  </div>

  <div style="background:var(--color-background-secondary); border-radius:var(--border-radius-md); padding:16px; margin-bottom:6px">
    <div style="font-size:11px; color:var(--color-text-secondary); margin-bottom:8px">Target: <span style="color:var(--color-text-info); font-weight:600; font-size:14px">67</span></div>
    <div id="array-display" style="display:flex; flex-wrap:wrap; justify-content:center; gap:2px"></div>
    <div id="index-row" style="display:flex; flex-wrap:wrap; justify-content:center; gap:2px; margin-top:6px"></div>
  </div>

  <div id="fib-info" style="display:flex; gap:8px; flex-wrap:wrap; margin-bottom:10px; align-items:center">
    <span style="font-size:11px; color:var(--color-text-secondary)">Fib numbers:</span>
    <span id="fib-nums" class="fib-display" style="color:var(--color-text-info)">—</span>
  </div>

  <div id="step-log" class="step-log" style="margin-bottom:14px; text-align:center"></div>

  <div style="display:flex; gap:16px; margin-bottom:16px; flex-wrap:wrap">
    <div style="flex:1; min-width:80px; background:var(--color-background-secondary); border-radius:var(--border-radius-md); padding:10px 14px">
      <div style="font-size:11px; color:var(--color-text-secondary); margin-bottom:3px">offset</div>
      <div id="offset-display" style="font-size:18px; font-weight:500; color:var(--color-text-primary)">-1</div>
    </div>
    <div style="flex:1; min-width:80px; background:var(--color-background-secondary); border-radius:var(--border-radius-md); padding:10px 14px">
      <div style="font-size:11px; color:var(--color-text-secondary); margin-bottom:3px">fibM</div>
      <div id="fibm-display" style="font-size:18px; font-weight:500; color:#FAC775">—</div>
    </div>
    <div style="flex:1; min-width:80px; background:var(--color-background-secondary); border-radius:var(--border-radius-md); padding:10px 14px">
      <div style="font-size:11px; color:var(--color-text-secondary); margin-bottom:3px">Comparisons</div>
      <div id="cmp-count" style="font-size:18px; font-weight:500; color:var(--color-text-primary)">0</div>
    </div>
    <div style="flex:2; min-width:140px; background:var(--color-background-secondary); border-radius:var(--border-radius-md); padding:10px 14px">
      <div style="font-size:11px; color:var(--color-text-secondary); margin-bottom:3px">Key insight</div>
      <div style="font-size:12px; font-weight:500; color:var(--color-text-secondary)">Uses only + and − (no division) -good for large arrays on disk</div>
    </div>
  </div>

  <div style="display:flex; gap:8px; flex-wrap:wrap; align-items:center">
    <button class="btn primary" id="btn-step" onclick="stepOnce()">Step →</button>
    <button class="btn" id="btn-auto" onclick="toggleAuto()">Auto play</button>
    <button class="btn" id="btn-reset" onclick="init()">Reset</button>
    <div style="margin-left:auto; display:flex; align-items:center; gap:8px; font-size:12px; color:var(--color-text-secondary)">
      Speed <input type="range" id="speed" min="100" max="900" value="400" step="100" style="width:80px" oninput="updateSpeed()">
      <span id="speed-label">0.8×</span>
    </div>
  </div>
</div>

<script>
const ARR = [5, 12, 18, 27, 34, 44, 55, 67, 72, 83, 91, 98];
const TARGET = 67;
let allSteps, stepIdx, autoTimer, speedMs, cmpCount;

function buildSteps() {
  const n = ARR.length, steps = [];
  let fibM2 = 0, fibM1 = 1, fibM = 1;
  while (fibM < n) { fibM2 = fibM1; fibM1 = fibM; fibM = fibM1 + fibM2; }
  steps.push({type:'initial', fibM, fibM1, fibM2});

  let offset = -1;
  while (fibM > 1) {
    const i = Math.min(offset + fibM2, n - 1);
    steps.push({type:'probe', idx:i, val:ARR[i], fibM, fibM1, fibM2, offset});
    if (ARR[i] < TARGET) {
      fibM = fibM1; fibM1 = fibM2; fibM2 = fibM - fibM1; offset = i;
      steps.push({type:'go-right', offset, fibM, fibM1, fibM2});
    } else if (ARR[i] > TARGET) {
      fibM = fibM2; fibM1 = fibM1 - fibM2; fibM2 = fibM - fibM1;
      steps.push({type:'go-left', offset, fibM, fibM1, fibM2});
    } else {
      steps.push({type:'found', idx:i}); return steps;
    }
  }
  if (fibM1 && offset+1 < n && ARR[offset+1] === TARGET) {
    steps.push({type:'check-last', idx:offset+1});
    steps.push({type:'found', idx:offset+1}); return steps;
  }
  steps.push({type:'not-found'});
  return steps;
}

function renderArr(probeIdx, offset, foundIdx) {
  const d = document.getElementById('array-display');
  const ir = document.getElementById('index-row');
  d.innerHTML = ''; ir.innerHTML = '';
  ARR.forEach((val, idx) => {
    const cell = document.createElement('div');
    cell.className = 'cell';
    cell.textContent = val;
    if (idx === foundIdx) cell.classList.add('found');
    else if (idx === probeIdx) cell.classList.add('fib-probe');
    else if (idx <= offset) cell.classList.add('eliminated');
    else cell.classList.add('active');
    d.appendChild(cell);
    const lbl = document.createElement('div');
    lbl.style.cssText = 'display:inline-flex;align-items:center;justify-content:center;width:48px;height:20px;font-size:10px;color:var(--color-text-secondary);margin:0 3px';
    lbl.textContent = idx;
    ir.appendChild(lbl);
  });
}

function init() {
  clearInterval(autoTimer); autoTimer = null;
  document.getElementById('btn-auto').textContent = 'Auto play';
  allSteps = buildSteps(); stepIdx = 0; cmpCount = 0; updateSpeed();
  renderArr(-1, -1, -1);
  document.getElementById('cmp-count').textContent = '0';
  document.getElementById('offset-display').textContent = '-1';
  document.getElementById('fibm-display').textContent = '—';
  document.getElementById('fib-nums').textContent = '—';
  document.getElementById('step-label').textContent = 'Step 0';
  document.getElementById('step-log').textContent = 'Press Step or Auto play to begin';
  document.getElementById('btn-step').disabled = false;
}

function updateSpeed() { const v = parseInt(document.getElementById('speed').value); speedMs = 1200 - v; document.getElementById('speed-label').textContent = (v/500).toFixed(1) + '×'; }
function setLog(msg) { const el = document.getElementById('step-log'); el.style.opacity = '0'; setTimeout(() => { el.textContent = msg; el.style.opacity = '1'; }, 120); }

function applyStep(s) {
  if (!s) return;
  document.getElementById('step-label').textContent = 'Step ' + stepIdx;
  if (s.type === 'initial') { renderArr(-1, -1, -1); document.getElementById('fib-nums').textContent = 'fibM2=' + s.fibM2 + ', fibM1=' + s.fibM1 + ', fibM=' + s.fibM; document.getElementById('fibm-display').textContent = s.fibM; setLog('Find smallest Fibonacci ≥ n=' + ARR.length + ' → fibM=' + s.fibM); }
  else if (s.type === 'probe') { cmpCount++; document.getElementById('cmp-count').textContent = cmpCount; document.getElementById('offset-display').textContent = s.offset; document.getElementById('fibm-display').textContent = s.fibM; document.getElementById('fib-nums').textContent = 'fibM2=' + s.fibM2 + ', fibM1=' + s.fibM1 + ', fibM=' + s.fibM; renderArr(s.idx, s.offset, -1); setLog('Probe idx=' + s.idx + ': arr[' + s.idx + ']=' + s.val + (s.val === TARGET ? ' ✓' : s.val < TARGET ? ' < ' + TARGET + ' → move right' : ' > ' + TARGET + ' → move left')); }
  else if (s.type === 'go-right') { document.getElementById('offset-display').textContent = s.offset; renderArr(-1, s.offset, -1); setLog('Eliminate left: offset=' + s.offset + ', shift Fib numbers down'); }
  else if (s.type === 'go-left') { renderArr(-1, s.offset, -1); setLog('Eliminate right: shift Fib numbers down twice'); }
  else if (s.type === 'check-last') { renderArr(s.idx, s.idx-1, -1); setLog('Check last remaining element at index ' + s.idx); }
  else if (s.type === 'found') {
    renderArr(-1, -1, s.idx);
    setLog('Found ' + TARGET + ' at index ' + s.idx + '! ' + cmpCount + ' comparisons -no division needed!');
    document.getElementById('step-label').textContent = 'Found ✓';
    document.getElementById('btn-step').disabled = true;
    clearInterval(autoTimer); autoTimer = null; document.getElementById('btn-auto').textContent = 'Auto play';
  }
}

function stepOnce() { if (stepIdx >= allSteps.length) return; applyStep(allSteps[stepIdx]); stepIdx++; }
function toggleAuto() { if (autoTimer) { clearInterval(autoTimer); autoTimer = null; document.getElementById('btn-auto').textContent = 'Auto play'; } else { document.getElementById('btn-auto').textContent = 'Pause'; autoTimer = setInterval(() => { if (stepIdx >= allSteps.length) { clearInterval(autoTimer); autoTimer = null; document.getElementById('btn-auto').textContent = 'Auto play'; return; } applyStep(allSteps[stepIdx]); stepIdx++; }, speedMs); } }

init();
</script>
