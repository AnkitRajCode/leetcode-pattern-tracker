<style>
  :root {
    --color-text-primary: #e2e8f0;
    --color-text-secondary: #94a3b8;
    --color-text-info: #93c5fd;
    --color-text-success: #6ee7b7;
    --color-background-secondary: #0f172a;
    --color-background-info: #1e3a5f;
    --color-background-success: #064e3b;
    --color-border-secondary: #334155;
    --border-radius-md: 8px;
  }
  html, body { margin:0; padding:0; background:#020617; overflow:hidden; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; }
  .node { width:40px; height:40px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:600; border:2px solid var(--color-border-secondary); color:var(--color-text-primary); transition:all 0.35s; position:absolute; flex-direction:column; }
  .node.current { border-color:#FAC775; background:rgba(250,199,117,0.2); color:#FAC775; box-shadow:0 0 10px rgba(250,199,117,0.3); }
  .node.finalized { border-color:#5DCAA5; background:rgba(93,202,165,0.15); color:#6ee7b7; }
  .node.relaxing { border-color:#93c5fd; background:var(--color-background-info); color:#93c5fd; }
  .node .dist { font-size:9px; margin-top:1px; opacity:0.8; }
  .edge-label { position:absolute; font-size:9px; color:var(--color-text-secondary); background:#020617; padding:1px 4px; border-radius:3px; }
  .edge { position:absolute; background:var(--color-border-secondary); transition:background 0.3s; height:2px; transform-origin:0 0; }
  .edge.active { background:#FAC775; }
  .edge.final { background:#5DCAA5; }
  .btn { padding:6px 16px; border-radius:var(--border-radius-md); border:0.5px solid var(--color-border-secondary); background:transparent; color:var(--color-text-primary); cursor:pointer; font-size:13px; transition:background 0.15s; }
  .btn:hover { background:var(--color-background-secondary); }
  .btn:disabled { opacity:0.4; cursor:not-allowed; }
  .btn.primary { background:var(--color-background-info); color:var(--color-text-info); border-color:transparent; }
  .legend-dot { width:10px; height:10px; border-radius:50%; display:inline-block; }
  .step-log { font-size:12px; color:var(--color-text-secondary); min-height:20px; transition:opacity 0.3s; }
  .dist-table { font-size:11px; border-collapse:collapse; width:100%; }
  .dist-table td,.dist-table th { padding:4px 6px; text-align:center; border-bottom:1px solid var(--color-border-secondary); }
  .dist-table th { color:var(--color-text-secondary); font-weight:500; }
</style>

<div style="padding:1.5rem 1rem 0">
  <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:4px">
    <div>
      <span style="font-size:16px; font-weight:500; color:var(--color-text-primary)">Dijkstra's Algorithm</span>
      <span style="font-size:13px; color:var(--color-text-secondary); margin-left:8px">-shortest path, greedy, O(V² or V log V)</span>
    </div>
    <span id="step-label" style="font-size:12px; color:var(--color-text-secondary)">Step 0</span>
  </div>

  <div style="display:flex; gap:14px; margin-bottom:14px; flex-wrap:wrap">
    <span style="display:flex;align-items:center;gap:4px;font-size:11px;color:var(--color-text-secondary)"><span class="legend-dot" style="background:rgba(250,199,117,0.2);border:2px solid #FAC775"></span>Current</span>
    <span style="display:flex;align-items:center;gap:4px;font-size:11px;color:var(--color-text-secondary)"><span class="legend-dot" style="background:var(--color-background-info);border:2px solid #93c5fd"></span>Relaxing</span>
    <span style="display:flex;align-items:center;gap:4px;font-size:11px;color:var(--color-text-secondary)"><span class="legend-dot" style="background:rgba(93,202,165,0.15);border:2px solid #5DCAA5"></span>Finalized</span>
  </div>

  <div style="display:flex; gap:16px; flex-wrap:wrap">
    <div style="flex:2; min-width:260px">
      <div id="graph" style="position:relative; height:190px; background:var(--color-background-secondary); border-radius:var(--border-radius-md)"></div>
    </div>
    <div style="flex:1; min-width:160px">
      <div style="font-size:11px; color:var(--color-text-secondary); margin-bottom:4px">Distance table (from A)</div>
      <table class="dist-table" id="dist-table">
        <tr><th>Node</th><th>dist</th><th>via</th></tr>
      </table>
    </div>
  </div>

  <div id="step-log" class="step-log" style="margin:12px 0; text-align:center"></div>

  <div style="display:flex; gap:8px; flex-wrap:wrap; align-items:center">
    <button class="btn primary" id="btn-step" onclick="stepOnce()">Step →</button>
    <button class="btn" id="btn-auto" onclick="toggleAuto()">Auto play</button>
    <button class="btn" id="btn-reset" onclick="init()">Reset</button>
    <div style="margin-left:auto; display:flex; align-items:center; gap:8px; font-size:12px; color:var(--color-text-secondary)">
      Speed <input type="range" id="speed" min="100" max="900" value="350" step="100" style="width:80px" oninput="updateSpeed()">
      <span id="speed-label">0.7×</span>
    </div>
  </div>
</div>

<script>
const LABELS=['A','B','C','D','E','F'];
const POS=[[10,50],[35,15],[35,85],[65,15],[65,85],[90,50]]; // x%, y%
// edges: [from, to, weight]
const EDGES=[[0,1,4],[0,2,2],[1,2,1],[1,3,5],[2,4,10],[3,4,2],[3,5,6],[4,5,3]];
// Adjacency list with weights
const ADJ=LABELS.map(()=>[]);
EDGES.forEach(([u,v,w])=>{ADJ[u].push({to:v,w});ADJ[v].push({to:u,w});});

let allSteps, stepIdx, autoTimer, speedMs;

function buildSteps(){
  const n=LABELS.length, steps=[];
  const dist=Array(n).fill(Infinity), prev=Array(n).fill(-1), finalized=new Set();
  dist[0]=0;
  steps.push({type:'initial',dist:[...dist],prev:[...prev],finalized:new Set(finalized)});

  for(let iter=0;iter<n;iter++){
    // Pick unfinalized with min dist
    let u=-1;
    for(let i=0;i<n;i++) if(!finalized.has(i)&&(u===-1||dist[i]<dist[u])) u=i;
    if(u===-1||dist[u]===Infinity) break;
    finalized.add(u);
    steps.push({type:'pick',u,dist:[...dist],prev:[...prev],finalized:new Set(finalized)});

    // Relax neighbors
    for(const {to:v,w} of ADJ[u]){
      if(finalized.has(v)) continue;
      const newDist=dist[u]+w;
      steps.push({type:'relax-check',u,v,w,oldDist:dist[v],newDist,dist:[...dist],prev:[...prev],finalized:new Set(finalized)});
      if(newDist<dist[v]){
        dist[v]=newDist; prev[v]=u;
        steps.push({type:'relax-update',u,v,dist:[...dist],prev:[...prev],finalized:new Set(finalized)});
      }
    }
  }
  steps.push({type:'done',dist:[...dist],prev:[...prev],finalized:new Set(finalized)});
  return steps;
}

function drawGraph(currentU, relaxingV, finalizedSet, activeEdge){
  const g=document.getElementById('graph');
  const w=g.offsetWidth||300, h=190;
  g.innerHTML='';

  // Draw edges
  EDGES.forEach(([a,b,wt])=>{
    const x1=POS[a][0]*w/100,y1=POS[a][1]*h/100;
    const x2=POS[b][0]*w/100,y2=POS[b][1]*h/100;
    const len=Math.sqrt((x2-x1)**2+(y2-y1)**2);
    const angle=Math.atan2(y2-y1,x2-x1)*180/Math.PI;
    const edge=document.createElement('div');
    edge.className='edge';
    if(activeEdge&&((activeEdge[0]===a&&activeEdge[1]===b)||(activeEdge[0]===b&&activeEdge[1]===a))) edge.classList.add('active');
    else if(finalizedSet.has(a)&&finalizedSet.has(b)) edge.classList.add('final');
    edge.style.cssText=`width:${len}px;left:${x1}px;top:${y1}px;transform:rotate(${angle}deg)`;
    g.appendChild(edge);
    // Weight label
    const lbl=document.createElement('div');
    lbl.className='edge-label';
    lbl.textContent=wt;
    lbl.style.left=((x1+x2)/2-6)+'px';lbl.style.top=((y1+y2)/2-8)+'px';
    g.appendChild(lbl);
  });

  // Draw nodes
  LABELS.forEach((label,idx)=>{
    const node=document.createElement('div');
    node.className='node';
    node.style.left=(POS[idx][0]*w/100-20)+'px';
    node.style.top=(POS[idx][1]*h/100-20)+'px';
    node.innerHTML=label;
    if(idx===currentU) node.classList.add('current');
    else if(idx===relaxingV) node.classList.add('relaxing');
    else if(finalizedSet.has(idx)) node.classList.add('finalized');
    g.appendChild(node);
  });
}

function renderDistTable(dist,prev,finalized){
  const t=document.getElementById('dist-table');
  t.innerHTML='<tr><th>Node</th><th>dist</th><th>via</th></tr>';
  LABELS.forEach((l,i)=>{
    const row=document.createElement('tr');
    const d=dist[i]===Infinity?'∞':dist[i];
    const p=prev[i]===-1?'—':LABELS[prev[i]];
    const color=finalized.has(i)?'color:var(--color-text-success)':'color:var(--color-text-primary)';
    row.innerHTML=`<td style="${color}">${l}</td><td style="${color}">${d}</td><td style="color:var(--color-text-secondary)">${p}</td>`;
    t.appendChild(row);
  });
}

function init(){
  clearInterval(autoTimer);autoTimer=null;document.getElementById('btn-auto').textContent='Auto play';
  allSteps=buildSteps();stepIdx=0;updateSpeed();
  const initDist=Array(LABELS.length).fill(Infinity);initDist[0]=0;
  drawGraph(-1,-1,new Set(),null);
  renderDistTable(initDist,Array(LABELS.length).fill(-1),new Set());
  document.getElementById('step-label').textContent='Step 0';
  document.getElementById('step-log').textContent='Dijkstra from A -always pick unfinalized node with smallest distance';
  document.getElementById('btn-step').disabled=false;
}

function updateSpeed(){const v=parseInt(document.getElementById('speed').value);speedMs=1300-v;document.getElementById('speed-label').textContent=(v/500).toFixed(1)+'×';}
function setLog(msg){const el=document.getElementById('step-log');el.style.opacity='0';setTimeout(()=>{el.textContent=msg;el.style.opacity='1';},120);}

function applyStep(s){
  if(!s)return;
  document.getElementById('step-label').textContent='Step '+stepIdx;
  if(s.type==='initial'){drawGraph(-1,-1,s.finalized,null);renderDistTable(s.dist,s.prev,s.finalized);setLog('Initialize: dist[A]=0, all others ∞');}
  else if(s.type==='pick'){drawGraph(s.u,-1,s.finalized,null);renderDistTable(s.dist,s.prev,s.finalized);setLog('Pick '+LABELS[s.u]+' (dist='+s.dist[s.u]+') -finalize it');}
  else if(s.type==='relax-check'){drawGraph(s.u,s.v,s.finalized,[s.u,s.v]);renderDistTable(s.dist,s.prev,s.finalized);const better=s.newDist<s.oldDist;setLog('Relax '+LABELS[s.u]+'→'+LABELS[s.v]+': '+s.dist[s.u]+'+'+s.w+'='+s.newDist+(better?' < '+(s.oldDist===Infinity?'∞':s.oldDist)+' ✓ update':' ≥ '+(s.oldDist===Infinity?'∞':s.oldDist)+' -skip'));}
  else if(s.type==='relax-update'){drawGraph(s.u,s.v,s.finalized,[s.u,s.v]);renderDistTable(s.dist,s.prev,s.finalized);setLog('Updated dist['+LABELS[s.v]+']='+s.dist[s.v]+' via '+LABELS[s.u]);}
  else if(s.type==='done'){drawGraph(-1,-1,s.finalized,null);renderDistTable(s.dist,s.prev,s.finalized);setLog('Done! Shortest distances from A: '+LABELS.map((l,i)=>l+'='+s.dist[i]).join(', '));document.getElementById('step-label').textContent='Done ✓';document.getElementById('btn-step').disabled=true;clearInterval(autoTimer);autoTimer=null;document.getElementById('btn-auto').textContent='Auto play';}
}

function stepOnce(){if(stepIdx>=allSteps.length)return;applyStep(allSteps[stepIdx]);stepIdx++;}
function toggleAuto(){if(autoTimer){clearInterval(autoTimer);autoTimer=null;document.getElementById('btn-auto').textContent='Auto play';}else{document.getElementById('btn-auto').textContent='Pause';autoTimer=setInterval(()=>{if(stepIdx>=allSteps.length){clearInterval(autoTimer);autoTimer=null;document.getElementById('btn-auto').textContent='Auto play';return;}applyStep(allSteps[stepIdx]);stepIdx++;},speedMs);}}

init();
</script>
