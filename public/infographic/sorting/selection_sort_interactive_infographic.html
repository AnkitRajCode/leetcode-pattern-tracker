<style>
  :root {
    --color-text-primary: #e2e8f0;
    --color-text-secondary: #94a3b8;
    --color-text-info: #93c5fd;
    --color-text-success: #6ee7b7;
    --color-background-secondary: #0f172a;
    --color-background-info: #1e3a5f;
    --color-background-success: #064e3b;
    --color-border-secondary: #334155;
    --color-border-tertiary: #475569;
    --color-border-success: #065f46;
    --border-radius-md: 8px;
  }
  html, body {
    margin: 0;
    padding: 0;
    background: #020617;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }
  @keyframes pulse { 0%{transform:scale(1)} 50%{transform:scale(1.08)} 100%{transform:scale(1)} }
  @keyframes settle { 0%{opacity:0;transform:scale(0.7)} 100%{opacity:1;transform:scale(1)} }
  @keyframes swap-anim { 0%{transform:translateY(0)} 50%{transform:translateY(-12px)} 100%{transform:translateY(0)} }
  .bar { transition: left 0.4s cubic-bezier(.4,0,.2,1), background 0.3s, box-shadow 0.3s; position:absolute; border-radius:6px 6px 0 0; display:flex; align-items:flex-start; justify-content:center; padding-top:6px; font-weight:500; font-size:12px; cursor:default; user-select:none; }
  .bar.sorted { box-shadow: 0 0 0 2.5px #0F6E56; background: #5DCAA5 !important; }
  .bar.current { box-shadow: 0 0 0 2.5px #534AB7; animation: pulse 0.6s ease-in-out; }
  .bar.min-found { box-shadow: 0 0 0 2.5px #EF9F27; background: #FAC775 !important; }
  .bar.scanning { box-shadow: 0 0 0 2px #7F77DD; }
  .bar.swapping { animation: swap-anim 0.4s ease-in-out; }
  .pass-badge { display:inline-flex; align-items:center; gap:6px; padding:4px 12px; border-radius:20px; font-size:12px; font-weight:500; }
  .btn { padding:6px 16px; border-radius:var(--border-radius-md); border:0.5px solid var(--color-border-secondary); background:transparent; color:var(--color-text-primary); cursor:pointer; font-size:13px; transition:background 0.15s; }
  .btn:hover { background:var(--color-background-secondary); }
  .btn:disabled { opacity:0.4; cursor:not-allowed; }
  .btn.primary { background:var(--color-background-info); color:var(--color-text-info); border-color:transparent; }
  .btn.primary:hover { opacity:0.85; }
  .legend-dot { width:10px; height:10px; border-radius:50%; display:inline-block; }
  .step-log { font-size:12px; color:var(--color-text-secondary); min-height:20px; transition:opacity 0.3s; }
</style>

<div style="padding:1.5rem 1rem 0">

  <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:4px">
    <div>
      <span style="font-size:16px; font-weight:500; color:var(--color-text-primary)">Selection sort</span>
      <span style="font-size:13px; color:var(--color-text-secondary); margin-left:8px">-find minimum, place it at the front</span>
    </div>
    <span id="pass-label" style="font-size:12px; color:var(--color-text-secondary)">Pass 0 of 0</span>
  </div>

  <div style="display:flex; gap:14px; margin-bottom:20px; flex-wrap:wrap">
    <span style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--color-text-secondary)"><span class="legend-dot" style="background:#AFA9EC;box-shadow:0 0 0 2px #534AB7"></span>Current position</span>
    <span style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--color-text-secondary)"><span class="legend-dot" style="background:#FAC775;box-shadow:0 0 0 2px #EF9F27"></span>Minimum found</span>
    <span style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--color-text-secondary)"><span class="legend-dot" style="background:#7F77DD"></span>Scanning</span>
    <span style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--color-text-secondary)"><span class="legend-dot" style="background:#5DCAA5;box-shadow:0 0 0 2px #0F6E56"></span>Sorted</span>
  </div>

  <div id="stage" style="position:relative; height:140px; margin-bottom:8px"></div>
  <div id="index-row" style="display:flex; justify-content:space-around; margin-bottom:16px; padding:0 4px"></div>
  <div id="step-log" class="step-log" style="margin-bottom:16px; text-align:center; min-height:18px"></div>

  <div style="display:flex; gap:16px; margin-bottom:20px; flex-wrap:wrap">
    <div style="flex:1; min-width:140px; background:var(--color-background-secondary); border-radius:var(--border-radius-md); padding:12px 16px">
      <div style="font-size:11px; color:var(--color-text-secondary); margin-bottom:4px">Total swaps</div>
      <div id="swap-count" style="font-size:22px; font-weight:500; color:var(--color-text-primary)">0</div>
    </div>
    <div style="flex:1; min-width:140px; background:var(--color-background-secondary); border-radius:var(--border-radius-md); padding:12px 16px">
      <div style="font-size:11px; color:var(--color-text-secondary); margin-bottom:4px">Comparisons</div>
      <div id="cmp-count" style="font-size:22px; font-weight:500; color:var(--color-text-primary)">0</div>
    </div>
    <div style="flex:2; min-width:200px; background:var(--color-background-secondary); border-radius:var(--border-radius-md); padding:12px 16px">
      <div style="font-size:11px; color:var(--color-text-secondary); margin-bottom:4px">Key insight</div>
      <div id="opt-status" style="font-size:13px; font-weight:500; color:var(--color-text-secondary)">Always exactly n-1 swaps (one per pass)</div>
    </div>
  </div>

  <div style="display:flex; gap:8px; flex-wrap:wrap; align-items:center">
    <button class="btn primary" id="btn-step" onclick="stepOnce()">Step →</button>
    <button class="btn" id="btn-auto" onclick="toggleAuto()">Auto play</button>
    <button class="btn" id="btn-reset" onclick="init()">Reset</button>
    <div style="margin-left:auto; display:flex; align-items:center; gap:8px; font-size:12px; color:var(--color-text-secondary)">
      Speed
      <input type="range" id="speed" min="100" max="900" value="500" step="100" style="width:80px" oninput="updateSpeed()">
      <span id="speed-label">1.0×</span>
    </div>
  </div>
</div>

<script>
const VALS = [72, 38, 91, 55, 18, 67, 44];
const COLORS = ['#64748b','#6b7280','#78716c','#7c7c7c','#8b8b8b','#9ca3af','#a1a1aa'];

let arr, allSteps, stepIdx, autoTimer, speedMs, swapCount, cmpCount;

function barHeight(val) {
  const mn = Math.min(...VALS), mx = Math.max(...VALS);
  return 30 + Math.round((val - mn) / (mx - mn) * 90);
}

function barColor(val) {
  const mn = Math.min(...VALS), mx = Math.max(...VALS);
  const t = (val - mn) / (mx - mn);
  return `hsl(${220 + t * 40}, ${30 + t * 20}%, ${55 + t * 15}%)`;
}

function buildSteps(startArr) {
  const a = [...startArr], n = a.length, steps = [];
  steps.push({type:'initial', arr:[...a], sorted:0});
  for (let i = 0; i < n - 1; i++) {
    let minIdx = i;
    steps.push({type:'pass-start', i, minIdx, arr:[...a], sorted:i});
    for (let j = i + 1; j < n; j++) {
      steps.push({type:'compare', i, j, minIdx, arr:[...a], sorted:i});
      if (a[j] < a[minIdx]) {
        minIdx = j;
        steps.push({type:'new-min', i, j, minIdx, arr:[...a], sorted:i});
      }
    }
    if (minIdx !== i) {
      [a[i], a[minIdx]] = [a[minIdx], a[i]];
      steps.push({type:'swap', i, minIdx, arr:[...a], sorted:i+1});
    } else {
      steps.push({type:'no-swap', i, arr:[...a], sorted:i+1});
    }
    steps.push({type:'pass-end', i, arr:[...a], sorted:i+1});
  }
  steps.push({type:'done', arr:[...a], sorted:n});
  return steps;
}

function renderArr(a, sorted, current, minFound, scanning) {
  const stage = document.getElementById('stage');
  const indexRow = document.getElementById('index-row');
  const n = a.length;
  const stageW = stage.offsetWidth || 600;
  const slotW = Math.floor(stageW / n);
  const barW = Math.min(slotW - 8, 50);
  stage.innerHTML = ''; indexRow.innerHTML = '';

  a.forEach((val, idx) => {
    const h = barHeight(val);
    const el = document.createElement('div');
    el.className = 'bar';
    el.style.width = barW + 'px';
    el.style.height = h + 'px';
    el.style.left = (slotW * idx + (slotW - barW) / 2) + 'px';
    el.style.bottom = '0';
    el.style.background = barColor(val);
    el.style.color = '#e2e8f0';
    el.textContent = val;

    if (idx < sorted) el.classList.add('sorted');
    else if (idx === minFound) el.classList.add('min-found');
    else if (idx === current) el.classList.add('current');
    else if (idx === scanning) el.classList.add('scanning');

    stage.appendChild(el);

    const lbl = document.createElement('div');
    lbl.style.cssText = 'width:' + slotW + 'px; text-align:center; font-size:10px; color:var(--color-text-secondary)';
    lbl.textContent = idx;
    indexRow.appendChild(lbl);
  });
}

function init() {
  clearInterval(autoTimer); autoTimer = null;
  document.getElementById('btn-auto').textContent = 'Auto play';
  arr = [...VALS]; swapCount = 0; cmpCount = 0;
  allSteps = buildSteps([...VALS]);
  stepIdx = 0; updateSpeed();
  renderArr(arr, 0, -1, -1, -1);
  document.getElementById('swap-count').textContent = '0';
  document.getElementById('cmp-count').textContent = '0';
  document.getElementById('pass-label').textContent = 'Pass 0 of ' + (arr.length - 1);
  document.getElementById('step-log').textContent = 'Press Step or Auto play to begin';
  document.getElementById('btn-step').disabled = false;
}

function updateSpeed() {
  const v = parseInt(document.getElementById('speed').value);
  speedMs = 1050 - v;
  document.getElementById('speed-label').textContent = (v/500).toFixed(1) + '×';
}

function setLog(msg) {
  const el = document.getElementById('step-log');
  el.style.opacity = '0';
  setTimeout(() => { el.textContent = msg; el.style.opacity = '1'; }, 120);
}

function applyStep(s) {
  if (!s) return;
  const n = arr.length;
  if (s.type === 'initial') { renderArr(s.arr, 0, -1, -1, -1); setLog('Array initialized -' + n + ' elements'); }
  else if (s.type === 'pass-start') {
    arr = [...s.arr];
    document.getElementById('pass-label').textContent = 'Pass ' + (s.i+1) + ' of ' + (n-1);
    renderArr(s.arr, s.sorted, s.i, -1, -1);
    setLog('Pass ' + (s.i+1) + ': find minimum in unsorted region [' + s.i + '..' + (n-1) + ']');
  }
  else if (s.type === 'compare') {
    cmpCount++; document.getElementById('cmp-count').textContent = cmpCount;
    renderArr(s.arr, s.sorted, s.i, s.minIdx, s.j);
    setLog('Comparing [' + s.j + ']=' + s.arr[s.j] + ' with current min [' + s.minIdx + ']=' + s.arr[s.minIdx]);
  }
  else if (s.type === 'new-min') {
    renderArr(s.arr, s.sorted, s.i, s.minIdx, -1);
    setLog('New minimum found! [' + s.minIdx + ']=' + s.arr[s.minIdx]);
  }
  else if (s.type === 'swap') {
    swapCount++; document.getElementById('swap-count').textContent = swapCount;
    arr = [...s.arr];
    renderArr(s.arr, s.sorted, -1, -1, -1);
    setLog('Swap [' + s.i + '] ↔ [' + s.minIdx + '] → ' + s.arr[s.i] + ' placed at index ' + s.i);
  }
  else if (s.type === 'no-swap') {
    arr = [...s.arr];
    renderArr(s.arr, s.sorted, -1, -1, -1);
    setLog('Min already at correct position -no swap needed');
  }
  else if (s.type === 'pass-end') {
    renderArr(s.arr, s.sorted, -1, -1, -1);
    setLog('Pass ' + (s.i+1) + ' done -' + s.arr[s.i] + ' locked at index ' + s.i);
  }
  else if (s.type === 'done') {
    renderArr(s.arr, n, -1, -1, -1);
    setLog('Sorted! ' + swapCount + ' swaps, ' + cmpCount + ' comparisons');
    document.getElementById('pass-label').textContent = 'Done ✓';
    document.getElementById('btn-step').disabled = true;
    clearInterval(autoTimer); autoTimer = null;
    document.getElementById('btn-auto').textContent = 'Auto play';
  }
}

function stepOnce() { if (stepIdx >= allSteps.length) return; applyStep(allSteps[stepIdx]); stepIdx++; }

function toggleAuto() {
  if (autoTimer) { clearInterval(autoTimer); autoTimer = null; document.getElementById('btn-auto').textContent = 'Auto play'; }
  else { document.getElementById('btn-auto').textContent = 'Pause'; autoTimer = setInterval(() => { if (stepIdx >= allSteps.length) { clearInterval(autoTimer); autoTimer = null; document.getElementById('btn-auto').textContent = 'Auto play'; return; } applyStep(allSteps[stepIdx]); stepIdx++; }, speedMs); }
}

init();
</script>
