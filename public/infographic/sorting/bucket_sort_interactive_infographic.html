<style>
  :root {
    --color-text-primary: #e2e8f0;
    --color-text-secondary: #94a3b8;
    --color-text-info: #93c5fd;
    --color-text-success: #6ee7b7;
    --color-background-secondary: #0f172a;
    --color-background-info: #1e3a5f;
    --color-border-secondary: #334155;
    --border-radius-md: 8px;
  }
  html, body { margin:0; padding:0; background:#020617; overflow:hidden; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; }
  .cell { display:inline-flex; align-items:center; justify-content:center; min-width:34px; height:28px; border-radius:6px; font-size:12px; font-weight:500; margin:2px; padding:0 4px; transition:all 0.3s; }
  .cell.highlight { background:#FAC775; color:#1e293b; box-shadow:0 0 0 2px #EF9F27; }
  .cell.sorted { background:#5DCAA5; color:#1e293b; }
  .cell.normal { background:#334155; color:#e2e8f0; }
  .cell.in-bucket { background:#7F77DD; color:#fff; }
  .bucket-box { display:inline-flex; flex-direction:column; align-items:center; min-width:70px; margin:4px; padding:8px 6px; border-radius:8px; border:1px solid #334155; background:#0f172a; }
  .bucket-title { font-size:9px; color:var(--color-text-secondary); margin-bottom:4px; font-weight:500; }
  .bucket-items { display:flex; flex-wrap:wrap; gap:2px; justify-content:center; min-height:24px; }
  .section { background:var(--color-background-secondary); border-radius:var(--border-radius-md); padding:10px 14px; margin-bottom:10px; }
  .section-label { font-size:10px; color:var(--color-text-secondary); margin-bottom:6px; font-weight:500; text-transform:uppercase; letter-spacing:0.5px; }
  .btn { padding:6px 16px; border-radius:var(--border-radius-md); border:0.5px solid var(--color-border-secondary); background:transparent; color:var(--color-text-primary); cursor:pointer; font-size:13px; transition:background 0.15s; }
  .btn:hover { background:var(--color-background-secondary); }
  .btn:disabled { opacity:0.4; cursor:not-allowed; }
  .btn.primary { background:var(--color-background-info); color:var(--color-text-info); border-color:transparent; }
  .legend-dot { width:10px; height:10px; border-radius:50%; display:inline-block; }
  .step-log { font-size:12px; color:var(--color-text-secondary); min-height:20px; transition:opacity 0.3s; }
</style>

<div style="padding:1.5rem 1rem 0">
  <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:4px">
    <div>
      <span style="font-size:16px; font-weight:500; color:var(--color-text-primary)">Bucket sort</span>
      <span style="font-size:13px; color:var(--color-text-secondary); margin-left:8px">-distribute into buckets, sort each, concatenate</span>
    </div>
    <span id="step-label" style="font-size:12px; color:var(--color-text-secondary)">Step 0</span>
  </div>

  <div style="display:flex; gap:14px; margin-bottom:14px; flex-wrap:wrap">
    <span style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--color-text-secondary)"><span class="legend-dot" style="background:#FAC775"></span>Distributing</span>
    <span style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--color-text-secondary)"><span class="legend-dot" style="background:#7F77DD"></span>In bucket</span>
    <span style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--color-text-secondary)"><span class="legend-dot" style="background:#5DCAA5"></span>Sorted</span>
  </div>

  <div id="array-section" class="section"></div>
  <div id="bucket-section" class="section" style="min-height:70px"></div>

  <div id="step-log" class="step-log" style="margin-bottom:14px; text-align:center"></div>

  <div style="display:flex; gap:16px; margin-bottom:16px; flex-wrap:wrap">
    <div style="flex:1; min-width:100px; background:var(--color-background-secondary); border-radius:var(--border-radius-md); padding:10px 14px">
      <div style="font-size:11px; color:var(--color-text-secondary); margin-bottom:3px">Phase</div>
      <div id="phase-label" style="font-size:13px; font-weight:500; color:var(--color-text-info)">Distribute</div>
    </div>
    <div style="flex:2; min-width:180px; background:var(--color-background-secondary); border-radius:var(--border-radius-md); padding:10px 14px">
      <div style="font-size:11px; color:var(--color-text-secondary); margin-bottom:3px">Key insight</div>
      <div style="font-size:12px; font-weight:500; color:var(--color-text-secondary)">O(n+k) average -best when input uniformly distributed</div>
    </div>
  </div>

  <div style="display:flex; gap:8px; flex-wrap:wrap; align-items:center">
    <button class="btn primary" id="btn-step" onclick="stepOnce()">Step →</button>
    <button class="btn" id="btn-auto" onclick="toggleAuto()">Auto play</button>
    <button class="btn" id="btn-reset" onclick="init()">Reset</button>
    <div style="margin-left:auto; display:flex; align-items:center; gap:8px; font-size:12px; color:var(--color-text-secondary)">
      Speed <input type="range" id="speed" min="100" max="900" value="500" step="100" style="width:80px" oninput="updateSpeed()">
      <span id="speed-label">1.0×</span>
    </div>
  </div>
</div>

<script>
const VALS = [0.72, 0.38, 0.91, 0.55, 0.18, 0.67, 0.44];
const NUM_BUCKETS = 5;
let allSteps, stepIdx, autoTimer, speedMs;

function buildSteps(input) {
  const steps = [], a = [...input], n = a.length;
  const buckets = Array.from({length:NUM_BUCKETS}, ()=>[]);
  steps.push({type:'initial', arr:[...a], buckets:buckets.map(b=>[...b])});

  // Distribute
  for (let i = 0; i < n; i++) {
    const bIdx = Math.min(Math.floor(a[i] * NUM_BUCKETS), NUM_BUCKETS - 1);
    buckets[bIdx].push(a[i]);
    steps.push({type:'distribute', arr:[...a], idx:i, val:a[i], bucketIdx:bIdx, buckets:buckets.map(b=>[...b])});
  }

  // Sort each bucket
  for (let b = 0; b < NUM_BUCKETS; b++) {
    if (buckets[b].length > 1) {
      const before = [...buckets[b]];
      buckets[b].sort((x,y)=>x-y);
      steps.push({type:'sort-bucket', bucketIdx:b, before, after:[...buckets[b]], buckets:buckets.map(bb=>[...bb]), arr:[...a]});
    }
  }

  // Concatenate
  const result = [];
  for (let b = 0; b < NUM_BUCKETS; b++) {
    for (const v of buckets[b]) result.push(v);
  }
  steps.push({type:'concat', arr:result, buckets:buckets.map(b=>[...b])});
  steps.push({type:'done', arr:result});
  return steps;
}

function renderArray(arr, highlightIdx, done) {
  const sec = document.getElementById('array-section');
  sec.innerHTML = '<div class="section-label">Array</div><div>' +
    arr.map((v, i) => '<span class="cell ' + (done ? 'sorted' : (i === highlightIdx ? 'highlight' : 'normal')) + '">' + v.toFixed(2) + '</span>').join('') + '</div>';
}

function renderBuckets(buckets) {
  const sec = document.getElementById('bucket-section');
  sec.innerHTML = '<div class="section-label">Buckets (range-based)</div><div style="display:flex;flex-wrap:wrap">' +
    buckets.map((b, i) => {
      const lo = (i / NUM_BUCKETS).toFixed(1), hi = ((i+1) / NUM_BUCKETS).toFixed(1);
      return '<div class="bucket-box"><div class="bucket-title">[' + lo + ', ' + hi + ')</div><div class="bucket-items">' +
        b.map(v => '<span class="cell in-bucket" style="min-width:40px">' + v.toFixed(2) + '</span>').join('') +
        (b.length === 0 ? '<span style="font-size:10px;color:#475569">empty</span>' : '') +
      '</div></div>';
    }).join('') + '</div>';
}

function init() {
  clearInterval(autoTimer); autoTimer = null;
  document.getElementById('btn-auto').textContent = 'Auto play';
  allSteps = buildSteps([...VALS]); stepIdx = 0; updateSpeed();
  renderArray(VALS, -1, false); renderBuckets(Array.from({length:NUM_BUCKETS},()=>[]));
  document.getElementById('step-label').textContent = 'Step 0';
  document.getElementById('phase-label').textContent = 'Distribute';
  document.getElementById('step-log').textContent = 'Press Step or Auto play to begin';
  document.getElementById('btn-step').disabled = false;
}

function updateSpeed() { const v=parseInt(document.getElementById('speed').value); speedMs=1050-v; document.getElementById('speed-label').textContent=(v/500).toFixed(1)+'×'; }
function setLog(msg) { const el=document.getElementById('step-log'); el.style.opacity='0'; setTimeout(()=>{el.textContent=msg;el.style.opacity='1';},120); }

function applyStep(s) {
  if (!s) return;
  document.getElementById('step-label').textContent = 'Step ' + stepIdx;

  if (s.type==='initial') { renderArray(s.arr,-1,false); renderBuckets(s.buckets); setLog('Input: ['+s.arr.map(v=>v.toFixed(2)).join(', ')+'] -'+NUM_BUCKETS+' buckets'); document.getElementById('phase-label').textContent='Distribute'; }
  else if (s.type==='distribute') { renderArray(s.arr,s.idx,false); renderBuckets(s.buckets); setLog(s.val.toFixed(2)+' → bucket['+s.bucketIdx+'] (floor('+s.val.toFixed(2)+'×'+NUM_BUCKETS+')='+s.bucketIdx+')'); }
  else if (s.type==='sort-bucket') { document.getElementById('phase-label').textContent='Sort buckets'; renderArray(s.arr,-1,false); renderBuckets(s.buckets); setLog('Sort bucket['+s.bucketIdx+']: ['+s.before.map(v=>v.toFixed(2)).join(', ')+'] → ['+s.after.map(v=>v.toFixed(2)).join(', ')+']'); }
  else if (s.type==='concat') { document.getElementById('phase-label').textContent='Concatenate'; renderArray(s.arr,-1,false); renderBuckets(s.buckets); setLog('Concatenate all buckets into result'); }
  else if (s.type==='done') { document.getElementById('phase-label').textContent='Done'; renderArray(s.arr,-1,true); renderBuckets([]); setLog('Sorted! Bucket sort complete -O(n+k) average'); document.getElementById('btn-step').disabled=true; clearInterval(autoTimer);autoTimer=null; document.getElementById('btn-auto').textContent='Auto play'; }
}

function stepOnce() { if(stepIdx>=allSteps.length)return; applyStep(allSteps[stepIdx]); stepIdx++; }
function toggleAuto() { if(autoTimer){clearInterval(autoTimer);autoTimer=null;document.getElementById('btn-auto').textContent='Auto play';}else{document.getElementById('btn-auto').textContent='Pause';autoTimer=setInterval(()=>{if(stepIdx>=allSteps.length){clearInterval(autoTimer);autoTimer=null;document.getElementById('btn-auto').textContent='Auto play';return;}applyStep(allSteps[stepIdx]);stepIdx++;},speedMs);} }

init();
</script>
