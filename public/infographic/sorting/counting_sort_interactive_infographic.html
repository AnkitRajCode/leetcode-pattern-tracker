<style>
  :root {
    --color-text-primary: #e2e8f0;
    --color-text-secondary: #94a3b8;
    --color-text-info: #93c5fd;
    --color-text-success: #6ee7b7;
    --color-background-secondary: #0f172a;
    --color-background-info: #1e3a5f;
    --color-background-success: #064e3b;
    --color-border-secondary: #334155;
    --border-radius-md: 8px;
  }
  html, body { margin:0; padding:0; background:#020617; overflow:hidden; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; }
  .cell { display:inline-flex; align-items:center; justify-content:center; min-width:32px; height:30px; border-radius:6px; font-size:12px; font-weight:500; margin:2px; padding:0 6px; transition:all 0.3s; }
  .cell.highlight { background:#FAC775; color:#1e293b; box-shadow:0 0 0 2px #EF9F27; }
  .cell.counted { background:#5DCAA5; color:#1e293b; box-shadow:0 0 0 2px #0F6E56; }
  .cell.normal { background:#334155; color:#e2e8f0; }
  .cell.output { background:#7F77DD; color:#fff; box-shadow:0 0 0 2px #534AB7; }
  .count-cell { display:inline-flex; flex-direction:column; align-items:center; min-width:32px; margin:2px; }
  .count-val { width:30px; height:26px; border-radius:4px; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:600; background:#1e293b; color:#e2e8f0; border:1px solid #334155; }
  .count-label { font-size:9px; color:var(--color-text-secondary); margin-top:2px; }
  .section { background:var(--color-background-secondary); border-radius:var(--border-radius-md); padding:10px 14px; margin-bottom:10px; }
  .section-label { font-size:10px; color:var(--color-text-secondary); margin-bottom:6px; font-weight:500; text-transform:uppercase; letter-spacing:0.5px; }
  .btn { padding:6px 16px; border-radius:var(--border-radius-md); border:0.5px solid var(--color-border-secondary); background:transparent; color:var(--color-text-primary); cursor:pointer; font-size:13px; transition:background 0.15s; }
  .btn:hover { background:var(--color-background-secondary); }
  .btn:disabled { opacity:0.4; cursor:not-allowed; }
  .btn.primary { background:var(--color-background-info); color:var(--color-text-info); border-color:transparent; }
  .btn.primary:hover { opacity:0.85; }
  .legend-dot { width:10px; height:10px; border-radius:50%; display:inline-block; }
  .step-log { font-size:12px; color:var(--color-text-secondary); min-height:20px; transition:opacity 0.3s; }
</style>

<div style="padding:1.5rem 1rem 0">
  <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:4px">
    <div>
      <span style="font-size:16px; font-weight:500; color:var(--color-text-primary)">Counting sort</span>
      <span style="font-size:13px; color:var(--color-text-secondary); margin-left:8px">-count occurrences, place by cumulative sum</span>
    </div>
    <span id="step-label" style="font-size:12px; color:var(--color-text-secondary)">Step 0</span>
  </div>

  <div style="display:flex; gap:14px; margin-bottom:14px; flex-wrap:wrap">
    <span style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--color-text-secondary)"><span class="legend-dot" style="background:#FAC775"></span>Processing</span>
    <span style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--color-text-secondary)"><span class="legend-dot" style="background:#7F77DD"></span>Output placed</span>
    <span style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--color-text-secondary)"><span class="legend-dot" style="background:#5DCAA5"></span>Done</span>
  </div>

  <div id="input-section" class="section"></div>
  <div id="count-section" class="section"></div>
  <div id="output-section" class="section"></div>

  <div id="step-log" class="step-log" style="margin-bottom:14px; text-align:center"></div>

  <div style="display:flex; gap:16px; margin-bottom:16px; flex-wrap:wrap">
    <div style="flex:1; min-width:120px; background:var(--color-background-secondary); border-radius:var(--border-radius-md); padding:10px 14px">
      <div style="font-size:11px; color:var(--color-text-secondary); margin-bottom:3px">Phase</div>
      <div id="phase-label" style="font-size:13px; font-weight:500; color:var(--color-text-info)">Count</div>
    </div>
    <div style="flex:2; min-width:180px; background:var(--color-background-secondary); border-radius:var(--border-radius-md); padding:10px 14px">
      <div style="font-size:11px; color:var(--color-text-secondary); margin-bottom:3px">Key insight</div>
      <div style="font-size:12px; font-weight:500; color:var(--color-text-secondary)">O(n+k) -no comparisons! Works for known integer range</div>
    </div>
  </div>

  <div style="display:flex; gap:8px; flex-wrap:wrap; align-items:center">
    <button class="btn primary" id="btn-step" onclick="stepOnce()">Step →</button>
    <button class="btn" id="btn-auto" onclick="toggleAuto()">Auto play</button>
    <button class="btn" id="btn-reset" onclick="init()">Reset</button>
    <div style="margin-left:auto; display:flex; align-items:center; gap:8px; font-size:12px; color:var(--color-text-secondary)">
      Speed <input type="range" id="speed" min="100" max="900" value="500" step="100" style="width:80px" oninput="updateSpeed()">
      <span id="speed-label">1.0×</span>
    </div>
  </div>
</div>

<script>
const VALS = [4, 2, 7, 3, 2, 5, 1, 4, 3, 6];
let allSteps, stepIdx, autoTimer, speedMs;

function buildSteps(input) {
  const steps = [], a = [...input];
  const max = Math.max(...a), min = Math.min(...a);
  const range = max - min + 1;
  const count = new Array(range).fill(0);
  const output = new Array(a.length).fill(null);

  steps.push({type:'initial', input:[...a], count:[...count], output:[...output], phase:'Count'});

  // Counting phase
  for (let i = 0; i < a.length; i++) {
    count[a[i] - min]++;
    steps.push({type:'count', input:[...a], count:[...count], output:[...output], idx:i, val:a[i], phase:'Count'});
  }

  // Cumulative sum
  steps.push({type:'cumulative-start', input:[...a], count:[...count], output:[...output], phase:'Cumulative'});
  for (let i = 1; i < range; i++) {
    count[i] += count[i-1];
    steps.push({type:'cumulative', input:[...a], count:[...count], output:[...output], idx:i, phase:'Cumulative'});
  }

  // Place elements (stable - right to left)
  steps.push({type:'place-start', input:[...a], count:[...count], output:[...output], phase:'Place'});
  for (let i = a.length - 1; i >= 0; i--) {
    const pos = count[a[i] - min] - 1;
    output[pos] = a[i];
    count[a[i] - min]--;
    steps.push({type:'place', input:[...a], count:[...count], output:[...output], inputIdx:i, outputIdx:pos, val:a[i], phase:'Place'});
  }

  steps.push({type:'done', input:[...a], count:[...count], output:[...output], phase:'Done'});
  return steps;
}

function renderInput(input, highlightIdx) {
  const sec = document.getElementById('input-section');
  sec.innerHTML = '<div class="section-label">Input array</div><div>' +
    input.map((v, i) => '<span class="cell ' + (i === highlightIdx ? 'highlight' : 'normal') + '">' + v + '</span>').join('') + '</div>';
}

function renderCount(count, highlightIdx) {
  const sec = document.getElementById('count-section');
  const min = Math.min(...VALS);
  sec.innerHTML = '<div class="section-label">Count array</div><div style="display:flex;flex-wrap:wrap">' +
    count.map((v, i) => '<div class="count-cell"><div class="count-val" style="' + (i === highlightIdx ? 'background:#FAC775;color:#1e293b;border-color:#EF9F27' : '') + '">' + v + '</div><div class="count-label">' + (i + min) + '</div></div>').join('') + '</div>';
}

function renderOutput(output, highlightIdx) {
  const sec = document.getElementById('output-section');
  sec.innerHTML = '<div class="section-label">Output array</div><div>' +
    output.map((v, i) => '<span class="cell ' + (v === null ? 'normal' : (i === highlightIdx ? 'output' : 'counted')) + '">' + (v !== null ? v : '·') + '</span>').join('') + '</div>';
}

function init() {
  clearInterval(autoTimer); autoTimer = null;
  document.getElementById('btn-auto').textContent = 'Auto play';
  allSteps = buildSteps([...VALS]);
  stepIdx = 0; updateSpeed();
  const s = allSteps[0];
  renderInput(s.input, -1); renderCount(s.count, -1); renderOutput(s.output, -1);
  document.getElementById('step-label').textContent = 'Step 0';
  document.getElementById('phase-label').textContent = 'Count';
  document.getElementById('step-log').textContent = 'Press Step or Auto play to begin';
  document.getElementById('btn-step').disabled = false;
}

function updateSpeed() { const v = parseInt(document.getElementById('speed').value); speedMs = 1050 - v; document.getElementById('speed-label').textContent = (v/500).toFixed(1) + '×'; }
function setLog(msg) { const el = document.getElementById('step-log'); el.style.opacity='0'; setTimeout(()=>{el.textContent=msg;el.style.opacity='1';},120); }

function applyStep(s) {
  if (!s) return;
  document.getElementById('step-label').textContent = 'Step ' + stepIdx;
  document.getElementById('phase-label').textContent = s.phase;
  const min = Math.min(...VALS);

  if (s.type === 'initial') { renderInput(s.input,-1); renderCount(s.count,-1); renderOutput(s.output,-1); setLog('Input: [' + s.input.join(', ') + '] -range [' + Math.min(...VALS) + '..' + Math.max(...VALS) + ']'); }
  else if (s.type === 'count') { renderInput(s.input,s.idx); renderCount(s.count,s.val-min); renderOutput(s.output,-1); setLog('Count[' + s.val + ']++ → ' + s.count[s.val-min]); }
  else if (s.type === 'cumulative-start') { renderInput(s.input,-1); renderCount(s.count,-1); renderOutput(s.output,-1); setLog('Build cumulative sum -count[i] += count[i-1]'); }
  else if (s.type === 'cumulative') { renderInput(s.input,-1); renderCount(s.count,s.idx); renderOutput(s.output,-1); setLog('Cumulative sum at index ' + s.idx + ' = ' + s.count[s.idx]); }
  else if (s.type === 'place-start') { renderInput(s.input,-1); renderCount(s.count,-1); renderOutput(s.output,-1); setLog('Place elements right-to-left (stable)'); }
  else if (s.type === 'place') { renderInput(s.input,s.inputIdx); renderCount(s.count,s.val-min); renderOutput(s.output,s.outputIdx); setLog('Place ' + s.val + ' at output[' + s.outputIdx + ']'); }
  else if (s.type === 'done') { renderInput(s.input,-1); renderCount(s.count,-1); renderOutput(s.output,-1); setLog('Sorted! O(n+k) with no comparisons'); document.getElementById('btn-step').disabled=true; clearInterval(autoTimer); autoTimer=null; document.getElementById('btn-auto').textContent='Auto play'; }
}

function stepOnce() { if (stepIdx >= allSteps.length) return; applyStep(allSteps[stepIdx]); stepIdx++; }
function toggleAuto() { if (autoTimer) { clearInterval(autoTimer); autoTimer=null; document.getElementById('btn-auto').textContent='Auto play'; } else { document.getElementById('btn-auto').textContent='Pause'; autoTimer=setInterval(()=>{ if(stepIdx>=allSteps.length){clearInterval(autoTimer);autoTimer=null;document.getElementById('btn-auto').textContent='Auto play';return;} applyStep(allSteps[stepIdx]);stepIdx++; },speedMs); } }

init();
</script>
