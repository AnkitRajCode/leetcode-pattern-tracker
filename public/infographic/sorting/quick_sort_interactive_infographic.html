<style>
  :root {
    --color-text-primary: #e2e8f0;
    --color-text-secondary: #94a3b8;
    --color-text-info: #93c5fd;
    --color-text-success: #6ee7b7;
    --color-background-secondary: #0f172a;
    --color-background-info: #1e3a5f;
    --color-background-success: #064e3b;
    --color-border-secondary: #334155;
    --color-border-tertiary: #475569;
    --color-border-success: #065f46;
    --border-radius-md: 8px;
  }
  html, body { margin:0; padding:0; background:#020617; overflow:hidden; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; }
  @keyframes pivot-glow { 0%,100%{box-shadow:0 0 0 2px #EF9F27} 50%{box-shadow:0 0 10px 3px #FAC775} }
  .bar { transition: left 0.4s cubic-bezier(.4,0,.2,1), background 0.3s, box-shadow 0.3s; position:absolute; border-radius:6px 6px 0 0; display:flex; align-items:flex-start; justify-content:center; padding-top:6px; font-weight:500; font-size:12px; cursor:default; user-select:none; }
  .bar.pivot { background:#FAC775 !important; box-shadow:0 0 0 2.5px #EF9F27; animation: pivot-glow 1s infinite; color:#1e293b !important; }
  .bar.less { background:#7F77DD !important; box-shadow:0 0 0 2px #534AB7; }
  .bar.greater { background:#ef4444 !important; box-shadow:0 0 0 2px #b91c1c; }
  .bar.sorted { background:#5DCAA5 !important; box-shadow:0 0 0 2.5px #0F6E56; }
  .bar.swapping { background:#AFA9EC !important; box-shadow:0 0 0 2px #7F77DD; }
  .bar.inactive { opacity:0.3; }
  .btn { padding:6px 16px; border-radius:var(--border-radius-md); border:0.5px solid var(--color-border-secondary); background:transparent; color:var(--color-text-primary); cursor:pointer; font-size:13px; transition:background 0.15s; }
  .btn:hover { background:var(--color-background-secondary); }
  .btn:disabled { opacity:0.4; cursor:not-allowed; }
  .btn.primary { background:var(--color-background-info); color:var(--color-text-info); border-color:transparent; }
  .btn.primary:hover { opacity:0.85; }
  .legend-dot { width:10px; height:10px; border-radius:50%; display:inline-block; }
  .step-log { font-size:12px; color:var(--color-text-secondary); min-height:20px; transition:opacity 0.3s; }
</style>

<div style="padding:1.5rem 1rem 0">
  <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:4px">
    <div>
      <span style="font-size:16px; font-weight:500; color:var(--color-text-primary)">Quick sort</span>
      <span style="font-size:13px; color:var(--color-text-secondary); margin-left:8px">-pick pivot, partition, recurse</span>
    </div>
    <span id="step-label" style="font-size:12px; color:var(--color-text-secondary)">Step 0</span>
  </div>

  <div style="display:flex; gap:14px; margin-bottom:20px; flex-wrap:wrap">
    <span style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--color-text-secondary)"><span class="legend-dot" style="background:#FAC775;box-shadow:0 0 0 2px #EF9F27"></span>Pivot</span>
    <span style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--color-text-secondary)"><span class="legend-dot" style="background:#7F77DD"></span>≤ pivot</span>
    <span style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--color-text-secondary)"><span class="legend-dot" style="background:#ef4444"></span>> pivot</span>
    <span style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--color-text-secondary)"><span class="legend-dot" style="background:#5DCAA5;box-shadow:0 0 0 2px #0F6E56"></span>Final position</span>
  </div>

  <div id="stage" style="position:relative; height:140px; margin-bottom:8px"></div>
  <div id="index-row" style="display:flex; justify-content:space-around; margin-bottom:16px; padding:0 4px"></div>
  <div id="step-log" class="step-log" style="margin-bottom:16px; text-align:center; min-height:18px"></div>

  <div style="display:flex; gap:16px; margin-bottom:20px; flex-wrap:wrap">
    <div style="flex:1; min-width:140px; background:var(--color-background-secondary); border-radius:var(--border-radius-md); padding:12px 16px">
      <div style="font-size:11px; color:var(--color-text-secondary); margin-bottom:4px">Swaps</div>
      <div id="swap-count" style="font-size:22px; font-weight:500; color:var(--color-text-primary)">0</div>
    </div>
    <div style="flex:1; min-width:140px; background:var(--color-background-secondary); border-radius:var(--border-radius-md); padding:12px 16px">
      <div style="font-size:11px; color:var(--color-text-secondary); margin-bottom:4px">Comparisons</div>
      <div id="cmp-count" style="font-size:22px; font-weight:500; color:var(--color-text-primary)">0</div>
    </div>
    <div style="flex:2; min-width:200px; background:var(--color-background-secondary); border-radius:var(--border-radius-md); padding:12px 16px">
      <div style="font-size:11px; color:var(--color-text-secondary); margin-bottom:4px">Key insight</div>
      <div style="font-size:13px; font-weight:500; color:var(--color-text-secondary)">Pivot lands in final position after each partition</div>
    </div>
  </div>

  <div style="display:flex; gap:8px; flex-wrap:wrap; align-items:center">
    <button class="btn primary" id="btn-step" onclick="stepOnce()">Step →</button>
    <button class="btn" id="btn-auto" onclick="toggleAuto()">Auto play</button>
    <button class="btn" id="btn-reset" onclick="init()">Reset</button>
    <div style="margin-left:auto; display:flex; align-items:center; gap:8px; font-size:12px; color:var(--color-text-secondary)">
      Speed
      <input type="range" id="speed" min="100" max="900" value="400" step="100" style="width:80px" oninput="updateSpeed()">
      <span id="speed-label">0.8×</span>
    </div>
  </div>
</div>

<script>
const VALS = [72, 38, 91, 55, 18, 67, 44];
let arr, allSteps, stepIdx, autoTimer, speedMs, swapCount, cmpCount;
let finalPositions = new Set();

function barHeight(val) {
  const mn = Math.min(...VALS), mx = Math.max(...VALS);
  return 30 + Math.round((val - mn) / (mx - mn) * 90);
}

function barColor(val) {
  const mn = Math.min(...VALS), mx = Math.max(...VALS);
  const t = (val - mn) / (mx - mn);
  return `hsl(${210 + t * 30}, ${30 + t * 20}%, ${45 + t * 20}%)`;
}

function buildSteps(startArr) {
  const a = [...startArr], n = a.length, steps = [];
  steps.push({type:'initial', arr:[...a], lo:0, hi:n-1});

  function qs(lo, hi) {
    if (lo >= hi) {
      if (lo === hi) steps.push({type:'single', arr:[...a], idx:lo});
      return;
    }
    const pivot = a[hi];
    steps.push({type:'choose-pivot', arr:[...a], lo, hi, pivot, pivotIdx:hi});
    let i = lo - 1;
    for (let j = lo; j < hi; j++) {
      steps.push({type:'compare', arr:[...a], lo, hi, j, i, pivot, pivotIdx:hi});
      if (a[j] <= pivot) {
        i++;
        if (i !== j) {
          [a[i], a[j]] = [a[j], a[i]];
          steps.push({type:'swap', arr:[...a], lo, hi, i, j, pivot, pivotIdx:hi});
        }
      }
    }
    [a[i+1], a[hi]] = [a[hi], a[i+1]];
    steps.push({type:'place-pivot', arr:[...a], lo, hi, pivotFinal:i+1, pivot});
    qs(lo, i);
    qs(i + 2, hi);
  }
  qs(0, n - 1);
  steps.push({type:'done', arr:[...a]});
  return steps;
}

function renderArr(a, opts) {
  const stage = document.getElementById('stage');
  const indexRow = document.getElementById('index-row');
  const n = a.length;
  const stageW = stage.offsetWidth || 600;
  const slotW = Math.floor(stageW / n);
  const barW = Math.min(slotW - 8, 50);
  stage.innerHTML = ''; indexRow.innerHTML = '';

  a.forEach((val, idx) => {
    const h = barHeight(val);
    const el = document.createElement('div');
    el.className = 'bar';
    el.style.width = barW + 'px';
    el.style.height = h + 'px';
    el.style.left = (slotW * idx + (slotW - barW) / 2) + 'px';
    el.style.bottom = '0';
    el.style.background = barColor(val);
    el.style.color = '#e2e8f0';
    el.textContent = val;

    if (finalPositions.has(idx)) el.classList.add('sorted');
    else if (opts.pivotIdx === idx) el.classList.add('pivot');
    else if (opts.lessSet && opts.lessSet.has(idx)) el.classList.add('less');
    else if (opts.greaterSet && opts.greaterSet.has(idx)) el.classList.add('greater');
    else if (opts.swapPair && opts.swapPair.includes(idx)) el.classList.add('swapping');

    if (opts.lo !== undefined && opts.hi !== undefined && (idx < opts.lo || idx > opts.hi) && !finalPositions.has(idx)) {
      el.classList.add('inactive');
    }

    stage.appendChild(el);

    const lbl = document.createElement('div');
    lbl.style.cssText = 'width:' + slotW + 'px; text-align:center; font-size:10px; color:var(--color-text-secondary)';
    lbl.textContent = idx;
    indexRow.appendChild(lbl);
  });
}

function init() {
  clearInterval(autoTimer); autoTimer = null;
  document.getElementById('btn-auto').textContent = 'Auto play';
  arr = [...VALS]; swapCount = 0; cmpCount = 0;
  finalPositions = new Set();
  allSteps = buildSteps([...VALS]);
  stepIdx = 0; updateSpeed();
  renderArr(arr, {});
  document.getElementById('swap-count').textContent = '0';
  document.getElementById('cmp-count').textContent = '0';
  document.getElementById('step-label').textContent = 'Step 0';
  document.getElementById('step-log').textContent = 'Press Step or Auto play to begin';
  document.getElementById('btn-step').disabled = false;
}

function updateSpeed() {
  const v = parseInt(document.getElementById('speed').value);
  speedMs = 1200 - v;
  document.getElementById('speed-label').textContent = (v/500).toFixed(1) + '×';
}

function setLog(msg) {
  const el = document.getElementById('step-log');
  el.style.opacity = '0';
  setTimeout(() => { el.textContent = msg; el.style.opacity = '1'; }, 120);
}

function applyStep(s) {
  if (!s) return;
  document.getElementById('step-label').textContent = 'Step ' + stepIdx;
  arr = [...s.arr];

  if (s.type === 'initial') { renderArr(s.arr, {}); setLog('Array: [' + s.arr.join(', ') + '] -using last element as pivot'); }
  else if (s.type === 'choose-pivot') {
    renderArr(s.arr, {pivotIdx:s.pivotIdx, lo:s.lo, hi:s.hi});
    setLog('Partition [' + s.lo + '..' + s.hi + '] -pivot = ' + s.pivot + ' (last element)');
  }
  else if (s.type === 'compare') {
    cmpCount++; document.getElementById('cmp-count').textContent = cmpCount;
    renderArr(s.arr, {pivotIdx:s.pivotIdx, lo:s.lo, hi:s.hi});
    setLog('Compare [' + s.j + ']=' + s.arr[s.j] + ' with pivot ' + s.pivot + ' → ' + (s.arr[s.j] <= s.pivot ? '≤ pivot' : '> pivot'));
  }
  else if (s.type === 'swap') {
    swapCount++; document.getElementById('swap-count').textContent = swapCount;
    renderArr(s.arr, {pivotIdx:s.pivotIdx, lo:s.lo, hi:s.hi, swapPair:[s.i, s.j]});
    setLog('Swap [' + s.i + '] ↔ [' + s.j + '] -move ' + s.arr[s.i] + ' to left partition');
  }
  else if (s.type === 'place-pivot') {
    swapCount++; document.getElementById('swap-count').textContent = swapCount;
    finalPositions.add(s.pivotFinal);
    renderArr(s.arr, {lo:s.lo, hi:s.hi});
    setLog('Pivot ' + s.pivot + ' placed at final index ' + s.pivotFinal + ' ✓');
  }
  else if (s.type === 'single') {
    finalPositions.add(s.idx);
    renderArr(s.arr, {});
    setLog('Single element [' + s.idx + ']=' + s.arr[s.idx] + ' -already in place');
  }
  else if (s.type === 'done') {
    finalPositions = new Set(VALS.map((_, i) => i));
    renderArr(s.arr, {});
    setLog('Sorted! ' + swapCount + ' swaps, ' + cmpCount + ' comparisons');
    document.getElementById('step-label').textContent = 'Done ✓';
    document.getElementById('btn-step').disabled = true;
    clearInterval(autoTimer); autoTimer = null;
    document.getElementById('btn-auto').textContent = 'Auto play';
  }
}

function stepOnce() { if (stepIdx >= allSteps.length) return; applyStep(allSteps[stepIdx]); stepIdx++; }

function toggleAuto() {
  if (autoTimer) { clearInterval(autoTimer); autoTimer = null; document.getElementById('btn-auto').textContent = 'Auto play'; }
  else { document.getElementById('btn-auto').textContent = 'Pause'; autoTimer = setInterval(() => { if (stepIdx >= allSteps.length) { clearInterval(autoTimer); autoTimer = null; document.getElementById('btn-auto').textContent = 'Auto play'; return; } applyStep(allSteps[stepIdx]); stepIdx++; }, speedMs); }
}

init();
</script>
