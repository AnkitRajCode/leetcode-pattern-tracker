<style>
  :root {
    --color-text-primary: #e2e8f0;
    --color-text-secondary: #94a3b8;
    --color-text-info: #93c5fd;
    --color-text-success: #6ee7b7;
    --color-background-secondary: #0f172a;
    --color-background-info: #1e3a5f;
    --color-border-secondary: #334155;
    --border-radius-md: 8px;
  }
  html, body { margin:0; padding:0; background:#020617; overflow:hidden; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; }
  .bar { transition: left 0.4s cubic-bezier(.4,0,.2,1), background 0.3s, box-shadow 0.3s; position:absolute; border-radius:6px 6px 0 0; display:flex; align-items:flex-start; justify-content:center; padding-top:5px; font-weight:500; font-size:11px; cursor:default; user-select:none; }
  .bar.run { background:#7F77DD !important; box-shadow:0 0 0 2px #534AB7; }
  .bar.merging { background:#FAC775 !important; box-shadow:0 0 0 2px #EF9F27; }
  .bar.sorted { background:#5DCAA5 !important; box-shadow:0 0 0 2px #0F6E56; }
  .bar.inserting { background:#AFA9EC !important; box-shadow:0 0 0 2px #7F77DD; }
  .run-marker { display:inline-flex; align-items:center; gap:4px; padding:3px 10px; border-radius:12px; font-size:11px; font-weight:500; margin:2px; }
  .btn { padding:6px 16px; border-radius:var(--border-radius-md); border:0.5px solid var(--color-border-secondary); background:transparent; color:var(--color-text-primary); cursor:pointer; font-size:13px; transition:background 0.15s; }
  .btn:hover { background:var(--color-background-secondary); }
  .btn:disabled { opacity:0.4; cursor:not-allowed; }
  .btn.primary { background:var(--color-background-info); color:var(--color-text-info); border-color:transparent; }
  .legend-dot { width:10px; height:10px; border-radius:50%; display:inline-block; }
  .step-log { font-size:12px; color:var(--color-text-secondary); min-height:20px; transition:opacity 0.3s; }
</style>

<div style="padding:1.5rem 1rem 0">
  <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:4px">
    <div>
      <span style="font-size:16px; font-weight:500; color:var(--color-text-primary)">Tim sort</span>
      <span style="font-size:13px; color:var(--color-text-secondary); margin-left:8px">-hybrid: insertion sort runs + merge</span>
    </div>
    <span id="step-label" style="font-size:12px; color:var(--color-text-secondary)">Step 0</span>
  </div>

  <div style="display:flex; gap:14px; margin-bottom:20px; flex-wrap:wrap">
    <span style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--color-text-secondary)"><span class="legend-dot" style="background:#AFA9EC"></span>Insertion sort</span>
    <span style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--color-text-secondary)"><span class="legend-dot" style="background:#7F77DD"></span>Run (sorted chunk)</span>
    <span style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--color-text-secondary)"><span class="legend-dot" style="background:#FAC775"></span>Merging</span>
    <span style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--color-text-secondary)"><span class="legend-dot" style="background:#5DCAA5"></span>Sorted</span>
  </div>

  <div id="stage" style="position:relative; height:130px; margin-bottom:8px"></div>
  <div id="index-row" style="display:flex; justify-content:space-around; margin-bottom:12px; padding:0 4px"></div>
  <div id="runs-display" style="display:flex; flex-wrap:wrap; gap:6px; margin-bottom:12px; min-height:26px"></div>
  <div id="step-log" class="step-log" style="margin-bottom:14px; text-align:center"></div>

  <div style="display:flex; gap:16px; margin-bottom:16px; flex-wrap:wrap">
    <div style="flex:1; min-width:100px; background:var(--color-background-secondary); border-radius:var(--border-radius-md); padding:10px 14px">
      <div style="font-size:11px; color:var(--color-text-secondary); margin-bottom:3px">Phase</div>
      <div id="phase-label" style="font-size:13px; font-weight:500; color:var(--color-text-info)">Create runs</div>
    </div>
    <div style="flex:1; min-width:100px; background:var(--color-background-secondary); border-radius:var(--border-radius-md); padding:10px 14px">
      <div style="font-size:11px; color:var(--color-text-secondary); margin-bottom:3px">RUN_SIZE</div>
      <div style="font-size:15px; font-weight:600; color:var(--color-text-primary)">4</div>
    </div>
    <div style="flex:2; min-width:160px; background:var(--color-background-secondary); border-radius:var(--border-radius-md); padding:10px 14px">
      <div style="font-size:11px; color:var(--color-text-secondary); margin-bottom:3px">Key insight</div>
      <div style="font-size:12px; font-weight:500; color:var(--color-text-secondary)">Used by Java & Python -O(n log n) worst, O(n) on sorted data</div>
    </div>
  </div>

  <div style="display:flex; gap:8px; flex-wrap:wrap; align-items:center">
    <button class="btn primary" id="btn-step" onclick="stepOnce()">Step →</button>
    <button class="btn" id="btn-auto" onclick="toggleAuto()">Auto play</button>
    <button class="btn" id="btn-reset" onclick="init()">Reset</button>
    <div style="margin-left:auto; display:flex; align-items:center; gap:8px; font-size:12px; color:var(--color-text-secondary)">
      Speed <input type="range" id="speed" min="100" max="900" value="400" step="100" style="width:80px" oninput="updateSpeed()">
      <span id="speed-label">0.8×</span>
    </div>
  </div>
</div>

<script>
const VALS = [72, 38, 91, 55, 18, 67, 44];
const RUN = 4;
let arr, allSteps, stepIdx, autoTimer, speedMs;

function barHeight(val){const mn=Math.min(...VALS),mx=Math.max(...VALS);return 30+Math.round((val-mn)/(mx-mn)*85);}
function barColor(val){const mn=Math.min(...VALS),mx=Math.max(...VALS),t=(val-mn)/(mx-mn);return `hsl(${210+t*30},${30+t*20}%,${48+t*18}%)`;}

function buildSteps(startArr) {
  const a=[...startArr], n=a.length, steps=[];
  steps.push({type:'initial',arr:[...a],runs:[]});

  // Phase 1: Create runs using insertion sort
  const runs=[];
  for(let i=0;i<n;i+=RUN) {
    const left=i, right=Math.min(i+RUN-1,n-1);
    runs.push([left,right]);
    steps.push({type:'run-start',arr:[...a],left,right,runs:[...runs]});
    // Insertion sort this run
    for(let j=left+1;j<=right;j++) {
      const key=a[j]; let k=j-1;
      while(k>=left&&a[k]>key){a[k+1]=a[k];k--;}
      a[k+1]=key;
    }
    steps.push({type:'run-sorted',arr:[...a],left,right,runs:[...runs]});
  }

  // Phase 2: Merge runs
  for(let size=RUN;size<n;size*=2) {
    for(let left=0;left<n;left+=2*size) {
      const mid=Math.min(left+size-1,n-1);
      const right=Math.min(left+2*size-1,n-1);
      if(mid>=right) continue;
      steps.push({type:'merge-start',arr:[...a],left,mid,right});
      // Merge
      const L=a.slice(left,mid+1), R=a.slice(mid+1,right+1);
      let i=0,j=0,k=left;
      while(i<L.length&&j<R.length){
        if(L[i]<=R[j])a[k++]=L[i++]; else a[k++]=R[j++];
      }
      while(i<L.length)a[k++]=L[i++];
      while(j<R.length)a[k++]=R[j++];
      steps.push({type:'merge-done',arr:[...a],left,right});
    }
  }
  steps.push({type:'done',arr:[...a]});
  return steps;
}

function renderArr(a, hlRange, hlType, done) {
  const stage=document.getElementById('stage'),indexRow=document.getElementById('index-row');
  const n=a.length,stageW=stage.offsetWidth||600,slotW=Math.floor(stageW/n),barW=Math.min(slotW-8,50);
  stage.innerHTML='';indexRow.innerHTML='';
  a.forEach((val,idx)=>{
    const h=barHeight(val),el=document.createElement('div');
    el.className='bar';el.style.width=barW+'px';el.style.height=h+'px';
    el.style.left=(slotW*idx+(slotW-barW)/2)+'px';el.style.bottom='0';
    el.style.background=barColor(val);el.style.color='#e2e8f0';el.textContent=val;
    if(done)el.classList.add('sorted');
    else if(hlRange&&idx>=hlRange[0]&&idx<=hlRange[1])el.classList.add(hlType||'run');
    stage.appendChild(el);
    const lbl=document.createElement('div');
    lbl.style.cssText='width:'+slotW+'px;text-align:center;font-size:10px;color:var(--color-text-secondary)';
    lbl.textContent=idx;indexRow.appendChild(lbl);
  });
}

function renderRuns(runs) {
  const d=document.getElementById('runs-display');
  d.innerHTML=runs.map((r,i)=>'<span class="run-marker" style="background:var(--color-background-secondary);color:var(--color-text-primary);border:1px solid var(--color-border-secondary)">Run '+(i+1)+': ['+r[0]+'..'+r[1]+']</span>').join('');
}

function init(){
  clearInterval(autoTimer);autoTimer=null;document.getElementById('btn-auto').textContent='Auto play';
  arr=[...VALS];allSteps=buildSteps([...VALS]);stepIdx=0;updateSpeed();
  renderArr(arr,null,null,false);renderRuns([]);
  document.getElementById('step-label').textContent='Step 0';
  document.getElementById('phase-label').textContent='Create runs';
  document.getElementById('step-log').textContent='Press Step or Auto play to begin';
  document.getElementById('btn-step').disabled=false;
}

function updateSpeed(){const v=parseInt(document.getElementById('speed').value);speedMs=1200-v;document.getElementById('speed-label').textContent=(v/500).toFixed(1)+'×';}
function setLog(msg){const el=document.getElementById('step-log');el.style.opacity='0';setTimeout(()=>{el.textContent=msg;el.style.opacity='1';},120);}

function applyStep(s){
  if(!s)return;
  document.getElementById('step-label').textContent='Step '+stepIdx;
  arr=[...s.arr];
  if(s.type==='initial'){renderArr(s.arr,null,null,false);renderRuns([]);setLog('Array: ['+s.arr.join(', ')+'] -RUN_SIZE='+RUN);}
  else if(s.type==='run-start'){document.getElementById('phase-label').textContent='Create runs';renderArr(s.arr,[s.left,s.right],'inserting',false);renderRuns(s.runs);setLog('Insertion sort on ['+s.left+'..'+s.right+']');}
  else if(s.type==='run-sorted'){renderArr(s.arr,[s.left,s.right],'run',false);renderRuns(s.runs);setLog('Run sorted: ['+s.arr.slice(s.left,s.right+1).join(', ')+']');}
  else if(s.type==='merge-start'){document.getElementById('phase-label').textContent='Merge runs';renderArr(s.arr,[s.left,s.right],'merging',false);setLog('Merge ['+s.left+'..'+s.mid+'] + ['+(s.mid+1)+'..'+s.right+']');}
  else if(s.type==='merge-done'){renderArr(s.arr,[s.left,s.right],'run',false);setLog('Merged → ['+s.arr.slice(s.left,s.right+1).join(', ')+']');}
  else if(s.type==='done'){renderArr(s.arr,null,null,true);setLog('Sorted! Tim sort complete -hybrid insertion + merge');document.getElementById('phase-label').textContent='Done';document.getElementById('step-label').textContent='Done ✓';document.getElementById('btn-step').disabled=true;clearInterval(autoTimer);autoTimer=null;document.getElementById('btn-auto').textContent='Auto play';}
}

function stepOnce(){if(stepIdx>=allSteps.length)return;applyStep(allSteps[stepIdx]);stepIdx++;}
function toggleAuto(){if(autoTimer){clearInterval(autoTimer);autoTimer=null;document.getElementById('btn-auto').textContent='Auto play';}else{document.getElementById('btn-auto').textContent='Pause';autoTimer=setInterval(()=>{if(stepIdx>=allSteps.length){clearInterval(autoTimer);autoTimer=null;document.getElementById('btn-auto').textContent='Auto play';return;}applyStep(allSteps[stepIdx]);stepIdx++;},speedMs);}}

init();
</script>
